version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chronos-postgres
    environment:
      POSTGRES_DB: chronos_db
      POSTGRES_USER: chronos_user
      POSTGRES_PASSWORD: chronos_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db:/docker-entrypoint-initdb.d
    networks:
      - chronos-network

  redis:
    image: redis:7-alpine
    container_name: chronos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chronos-network

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: chronos-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - chronos-network

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T20-22-17Z
    container_name: chronos-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}) do echo 'waiting for minio...' && sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/chronos-objects;
      /usr/bin/mc anonymous set none local/chronos-objects;
      exit 0;
      "
    networks:
      - chronos-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chronos-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://chronos_user:chronos_pass@postgres:5432/chronos_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=development
      - PLAYWRIGHT_BROWSERS_PATH=/app/browser-cache
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=0
      - OBJECT_STORAGE_PROVIDER=s3
      - OBJECT_STORAGE_ENDPOINT_URL=http://minio:9000
      - OBJECT_STORAGE_REGION=us-east-1
      - OBJECT_STORAGE_BUCKET=chronos-objects
      - OBJECT_STORAGE_ACCESS_KEY_ID=minioadmin
      - OBJECT_STORAGE_SECRET_ACCESS_KEY=minioadmin
      - OBJECT_STORAGE_USE_SSL=false
      - OBJECT_STORAGE_FORCE_PATH_STYLE=true
      - OBJECT_STORAGE_BASE_PREFIX=chronos
    depends_on:
      - postgres
      - redis
      - minio-init
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - playwright-browser-cache:/app/browser-cache
    networks:
      - chronos-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chronos-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - chronos-network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  minio_data:
  playwright-browser-cache:


networks:
  chronos-network:
    driver: bridge
